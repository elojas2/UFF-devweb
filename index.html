<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho 1 de Dev Web</title>
</head>
<body>
    <div class="container">
        <form class="form" id="product-form">
            <label for="product-name">Nome do produto:</label>
            <input type="text" id="product-name" name="product-name" placeholder="Camisa"><br><br>

            <label for="product-category">Categoria:</label>
            <input type="text" id="product-category" name="product-category" placeholder="Roupas"><br><br>

            <label for="product-price">Preço:</label>
            <input type="number" id="product-price" name="product-price" placeholder="99.99"><br><br>
            <input class="btn-submit" type="submit" value="Adicionar produto">
        </form>

        <div class="data-product">
            <h2>Dados do produto:</h2>
            <p class="message"> </p>
            <div id="product-data"></div>

        </div>
        <!-- Lista (Área de injeção) -->
        <div class="list-product" id="list-product"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
